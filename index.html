<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>See You Till Next Time</title>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* Removes the gray highlight box on iPhone taps */
      -webkit-tap-highlight-color: transparent; 
    }

    html, body {
      /* Prevents bouncing/scrolling issues on iOS */
      height: 100%;
      overflow: hidden; 
      width: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      padding: 20px;
      /* Background handled by a div for better Safari performance */
      background: #0f172a; 
    }

    #bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-gradient);
      transition: background 0.6s ease;
      z-index: 1;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 10; /* Ensures content is above circles and background */
      padding: 40px 24px;
      border-radius: 30px;
      /* Reduced blur intensity for better iOS performance */
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: clamp(1.8rem, 7vw, 3rem);
      line-height: 1.2;
      font-weight: 800;
      margin-bottom: 15px;
      animation: float 4s ease-in-out infinite;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 20px;
      background: #38bdf8;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      /* Essential for Safari button styling */
      -webkit-appearance: none; 
      transition: transform 0.2s active;
    }

    button:active {
      transform: scale(0.96);
      background: #7dd3fc;
    }

    /* Floating Background Circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      z-index: 2;
      animation: move 20s linear infinite;
    }
    .c1 { width: 150px; height: 150px; top: -20px; left: -30px; }
    .c2 { width: 200px; height: 200px; bottom: -50px; right: -40px; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes move {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(20px, -20px) rotate(180deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>
  <div class="circle c1"></div>
  <div class="circle c2"></div>

  <div class="container">
    <h1 id="message">See You Till Next Time 👋</h1>
    <p>Thanks for visiting. Wishing you happiness, peace, and success ahead.</p>
    <button id="changeBtn">Tap Here ✨</button>
  </div>

  <script>
    const messages = [
      "See You Till Next Time 👋",
      "Goodbye & Take Care ✨",
      "Until We Meet Again 🌙",
      "Come Back Soon 🚀",
      "Stay Safe & Happy 💙"
    ];

    const backgrounds = [
      "linear-gradient(135deg,#0f172a,#1e293b,#334155)",
      "linear-gradient(135deg,#111827,#1d4ed8,#38bdf8)",
      "linear-gradient(135deg,#3b0764,#7e22ce,#c084fc)",
      "linear-gradient(135deg,#052e16,#15803d,#4ade80)",
      "linear-gradient(135deg,#3f0d12,#a71d31,#ff4d6d)"
    ];

    let index = 0;
    const button = document.getElementById("changeBtn");
    const messageEl = document.getElementById("message");
    const bgLayer = document.getElementById("bg-layer");

    // "touchstart" provides faster response on iPhone than "click"
    const triggerChange = (e) => {
      e.preventDefault();
      index = (index + 1) % messages.length;
      messageEl.innerText = messages[index];
      bgLayer.style.background = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    };

    button.addEventListener("click", triggerChange);
  </script>
</body>
</html>
